<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shape Extractor — Frinks Prototype</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root{
    --orange:#e8542b; --orange-d:#c8431f; --green:#56b733; --green-d:#489c2a;
    --ink:#23282c; --muted:#6b7280; --line:#d6d9dc; --line-d:#b4b6b8;
    --hdr:#e3e5e5; --bg:#f4f5f6; --blue:#2f6fed; --purple:#7c3aed; --red:#e0473a;
  }
  html,body{height:100%;}
  body{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); background:var(--bg); font-size:13px; -webkit-font-smoothing:antialiased; }
  #root{height:100vh;}
  button{font-family:inherit;cursor:pointer;}
  select,input{font-family:inherit;font-size:12px;}
  .app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

  .topbar{display:flex;align-items:center;justify-content:space-between;
    padding:8px 14px;background:#fff;border-bottom:1px solid var(--line-d);flex-shrink:0;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:600;font-size:14px;}
  .brand .dot{width:22px;height:22px;border-radius:6px;background:var(--orange);
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px;}
  .crumbs{color:var(--muted);font-size:12px;}
  .crumbs b{color:var(--ink);font-weight:600;}
  .switch{display:flex;background:#eef0f2;border:1px solid var(--line);border-radius:9px;padding:3px;gap:3px;}
  .switch button{border:0;background:transparent;padding:6px 13px;border-radius:7px;font-size:12px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:7px;}
  .switch button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px #0000001f;}
  .switch button .pv{font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;background:var(--orange);color:#fff;}
  .switch button.on .pv.edge{background:var(--green);}
  .switch button:not(.on) .pv{background:#c3c7cc;}

  .stage{flex:1;display:flex;min-height:0;}
  .canvas-col{flex:1;min-width:0;background:#eceef0;position:relative;display:flex;flex-direction:column;}
  .canvas-tools{position:absolute;top:10px;left:10px;display:flex;gap:6px;z-index:5;}
  .canvas-tools .ct{background:#fff;border:1px solid var(--line);border-radius:7px;padding:5px 9px;font-size:11px;font-weight:600;color:var(--ink);box-shadow:0 1px 2px #0000000f;}
  .canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:26px;min-height:0;}
  .frame{border:3px solid var(--orange);border-radius:4px;background:#11151a;box-shadow:0 6px 24px #0003;position:relative;}
  .frame .flabel{position:absolute;top:-11px;left:12px;background:var(--orange);color:#fff;font-size:10px;font-weight:700;padding:1px 8px;border-radius:3px;letter-spacing:.3px;}
  .drawhint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:#111826de;color:#fff;
    font-size:11px;padding:6px 12px;border-radius:20px;z-index:5;display:flex;gap:7px;align-items:center;white-space:nowrap;}
  .drawhint.arm{background:#e8542bee;}
  .drawhint .k{background:#ffffff2b;padding:1px 6px;border-radius:4px;font-weight:700;}

  .flow-col{width:172px;flex-shrink:0;background:#f8f9fa;border-left:1px solid var(--line);border-right:1px solid var(--line);
    display:flex;flex-direction:column;align-items:center;gap:0;padding:20px 0;overflow-y:auto;}
  .fnode{width:118px;border:1px solid #cfd3d7;background:#fff;border-radius:7px;padding:8px 6px;text-align:center;font-size:11px;position:relative;}
  .fnode .ft{font-weight:600;}
  .fnode .fs{font-size:9px;color:var(--muted);margin-top:1px;}
  .fnode.master{background:#eef4ff;border-color:#b9d0ff;}
  .fnode.done{border-color:var(--green);}
  .fnode.done .badge{position:absolute;top:-6px;right:-6px;width:15px;height:15px;border-radius:50%;background:var(--green);color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:800;}
  .fnode.sel{border-color:var(--orange);box-shadow:0 0 0 2px #e8542b33;}
  .fconn{width:2px;height:16px;background:#cfd3d7;}

  .pane{width:360px;flex-shrink:0;background:#fff;display:flex;flex-direction:column;box-shadow:-2px 0 10px #00000018;height:100%;}
  .pane-hdr{display:flex;align-items:center;justify-content:space-between;background:var(--hdr);padding:10px 12px;font-size:16px;font-weight:600;}
  .pane-hdr .x{font-size:15px;color:#555;cursor:pointer;line-height:1;}
  .pane-hdr .ic{display:flex;align-items:center;gap:7px;}
  .pane-hdr .ic .sq{width:18px;height:18px;border-radius:4px;background:var(--orange);}
  .stepper{display:flex;gap:8px;align-items:center;background:#fff;padding:7px 12px;border-bottom:1px solid #111;font-size:11.5px;}
  .stepper .st{color:#9aa0a6;}
  .stepper .st.active{color:var(--ink);font-weight:700;}
  .stepper .sep{color:#c3c7cc;}
  .pane-body{flex:1;overflow-y:auto;padding:0;}
  .pane-foot{display:flex;justify-content:center;gap:10px;padding:11px;border-top:1px solid var(--line);background:#fff;}

  .btn{border:0;border-radius:22px;padding:8px 22px;font-size:13px;font-weight:600;}
  .btn-primary{background:var(--orange);color:#fff;}
  .btn-primary:hover{background:var(--orange-d);}
  .btn-primary:disabled{background:#e6b3a3;cursor:not-allowed;}
  .btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line-d);}
  .btn-ghost:hover{background:#f4f5f6;}

  .sec{padding:14px 14px;border-bottom:1px solid #eef0f1;}
  .lbl{display:block;font-size:12px;font-weight:600;color:#3d4247;margin-bottom:5px;}
  .lbl .sub{font-weight:400;color:var(--muted);}
  .sel,.inp{width:100%;border:1px solid var(--line-d);border-radius:6px;padding:7px 9px;background:#fff;color:var(--ink);}
  .sel:focus,.inp:focus{outline:none;border-color:var(--orange);}
  .namewrap{display:flex;align-items:stretch;border:1px solid var(--line-d);border-radius:6px;overflow:hidden;}
  .namewrap:focus-within{border-color:var(--orange);}
  .namewrap.dup{border-color:var(--red);}
  .nameprefix{display:flex;align-items:center;padding:0 8px;background:#f2f4f5;color:var(--muted);font-size:12px;font-weight:700;border-right:1px solid var(--line-d);white-space:nowrap;}
  .nameinput{flex:1;border:0;padding:7px 9px;font-size:12px;color:var(--ink);outline:none;background:#fff;min-width:0;}
  .hint{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.4;}
  .err{font-size:11px;color:var(--red);margin-top:5px;line-height:1.4;display:flex;gap:5px;}
  .okline{font-size:11px;color:var(--green-d);margin-top:5px;display:flex;gap:5px;align-items:center;font-weight:600;}

  .addbtn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;border:1.5px dashed var(--orange);
    color:var(--orange);background:#fff6f3;border-radius:8px;padding:9px;font-weight:700;font-size:12.5px;}
  .addbtn:hover{background:#ffeee8;}

  .shapecard{border:1px solid var(--line);border-radius:9px;margin:12px 14px;overflow:hidden;}
  .shapecard.sel{border-color:var(--orange);box-shadow:0 0 0 2px #e8542b1f;}
  .sc-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;background:#fafbfc;cursor:pointer;border-bottom:1px solid #eef0f1;}
  .sc-hdr .t{display:flex;align-items:center;gap:8px;font-weight:700;font-size:12.5px;}
  .sc-hdr .chip.num{width:19px;height:19px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;padding:0;font-size:11px;}
  .sc-hdr .tools{display:flex;gap:9px;align-items:center;color:var(--muted);}
  .sc-hdr .tools .del{display:flex;align-items:center;}
  .sc-hdr .tools .del:hover svg{stroke:var(--red);}
  .sc-body{padding:12px 12px 14px;}
  .field{margin-bottom:12px;}
  .field:last-child{margin-bottom:0;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .rowcta{display:grid;grid-template-columns:1fr auto;gap:9px;align-items:end;}
  .modetoggle{display:flex;border:1px solid var(--line-d);border-radius:7px;overflow:hidden;}
  .modetoggle button{flex:1;border:0;background:#fff;padding:7px;font-size:11.5px;font-weight:600;color:var(--muted);}
  .modetoggle button.on{background:var(--ink);color:#fff;}
  .drawbtn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;border:1px solid var(--line-d);
    background:#fff;border-radius:7px;padding:8px 12px;font-weight:600;font-size:12px;color:var(--ink);white-space:nowrap;}
  .drawbtn.done{background:#eef7ea;border-color:var(--green);color:var(--green-d);}
  .drawbtn.armed{background:#fff3ee;border-color:var(--orange);color:var(--orange);}
  .genbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:0;border-radius:7px;
    padding:9px;font-weight:700;font-size:12.5px;background:var(--green);color:#fff;margin-top:2px;}
  .genbtn:hover{background:var(--green-d);}
  .genbtn.dis{background:#cdd2d6;cursor:not-allowed;}
  .genbtn.re{background:#fff;color:var(--green-d);border:1px solid var(--green);}
  .miniauto{font-size:10px;color:var(--muted);background:#f2f4f5;border-radius:5px;padding:4px 7px;display:inline-block;}
  .block-t{font-size:11px;font-weight:700;color:#3d4247;text-transform:uppercase;letter-spacing:.4px;margin:2px 0 8px;display:flex;align-items:center;gap:6px;}
  .block-t .ln{flex:1;height:1px;background:#eef0f1;}
  .tinylab{font-size:10.5px;color:var(--muted);margin-bottom:3px;display:block;font-weight:600;}
  .boxtabs{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
  .boxtabs button{border:1px solid var(--line-d);background:#fff;border-radius:6px;padding:5px 9px;font-size:11px;font-weight:600;color:var(--muted);}
  .boxtabs button.on{background:var(--orange);border-color:var(--orange);color:#fff;}

  .outrow{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid #f1f2f3;}
  .outrow:last-child{border-bottom:0;}
  .outrow input{width:15px;height:15px;accent-color:var(--green);}
  .outrow .on{flex:1;font-size:12px;}
  .outrow.errrow .on{color:var(--muted);}
  .outrow .emv{font-size:11px;color:var(--ink);font-weight:600;}
  .outcard{margin:12px 14px;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
  .outcard .oh{padding:9px 11px;background:#fafbfc;border-bottom:1px solid #eef0f1;font-weight:700;font-size:12.5px;display:flex;align-items:center;gap:8px;}
  .outcard .ob{padding:6px 12px 10px;}

  .appbar{display:flex;align-items:center;gap:12px;padding:7px 14px;background:#fff;border-top:1px solid var(--line-d);flex-shrink:0;font-size:12px;}
  .appbar .pill{background:var(--orange);color:#fff;font-weight:700;padding:3px 10px;border-radius:20px;font-size:11px;}
  .appbar .steps{display:flex;gap:6px;align-items:center;color:var(--muted);}
  .appbar .steps .s{padding:2px 9px;border-radius:14px;background:#f0f1f3;}
  .appbar .steps .s.cur{background:var(--ink);color:#fff;font-weight:600;}

  .toast{position:fixed;bottom:56px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;
    padding:10px 18px;border-radius:9px;font-weight:600;font-size:13px;box-shadow:0 6px 20px #0003;z-index:60;display:flex;gap:9px;align-items:center;}
  .toast.warn{background:#e0473a;}

  /* confirm modal */
  .overlay{position:fixed;inset:0;background:#0006;z-index:70;display:flex;align-items:center;justify-content:center;}
  .modal{background:#fff;border-radius:12px;width:340px;box-shadow:0 20px 50px #0004;overflow:hidden;}
  .modal .mh{padding:14px 16px;font-weight:700;font-size:15px;border-bottom:1px solid #eef0f1;display:flex;align-items:center;gap:8px;}
  .modal .mb{padding:16px;font-size:13px;line-height:1.5;color:#42474c;}
  .modal .mf{display:flex;justify-content:flex-end;gap:9px;padding:12px 16px;border-top:1px solid #eef0f1;}

  /* ===== Edge · Edit Module Configurations ===== */
  .emc{flex:1;display:flex;flex-direction:column;min-height:0;}
  .emc-crumbs{display:flex;align-items:center;gap:7px;padding:8px 16px;font-size:12px;color:var(--muted);background:#fafbfc;border-bottom:1px solid var(--line);}
  .emc-crumbs b{color:var(--ink);font-weight:600;}
  .emc-selectors{display:flex;gap:14px;padding:12px 16px;background:#fff;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .emc-selectors .fld{display:flex;flex-direction:column;gap:4px;min-width:210px;}
  .emc-selectors .fld.grow{flex:1;min-width:260px;}
  .emc-selectors label{font-size:11px;font-weight:700;color:#3d4247;}
  .emc-body{flex:1;min-height:0;display:flex;overflow:hidden;}
  .emc-split{flex:1;display:flex;min-height:0;}
  .emc-config{width:400px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--line);background:#fff;}
  .emc-canvas{flex:1;min-width:0;background:#eceef0;position:relative;display:flex;flex-direction:column;}
  .emc-dim{flex:1;overflow-y:auto;padding:16px 18px;background:#fff;}
  .emc-foot{display:flex;justify-content:flex-end;gap:10px;padding:11px 16px;border-top:1px solid var(--line-d);background:#fff;flex-shrink:0;}
  .btn.sm{padding:7px 20px;font-size:12.5px;}
  .roinput{width:100%;border:1px solid var(--line-d);border-radius:6px;padding:7px 9px;background:#f2f4f5;color:#7b8085;cursor:not-allowed;font-size:12px;}
  .lockrow{display:flex;align-items:center;gap:5px;font-size:10px;color:#9aa0a6;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
  .dimcard{border:1px solid var(--line);border-radius:9px;padding:14px;margin-bottom:14px;}
  .dimcard .dh{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .dimcard .dh .chip.num{width:19px;height:19px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;}
  .gtgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .feat{display:flex;gap:8px;}
  .feat .roinput{flex:1;}
  .banner{display:flex;gap:9px;align-items:flex-start;padding:10px 12px;border-radius:8px;font-size:12px;margin-bottom:16px;line-height:1.45;}
  .banner.warn{background:#fdECe8;color:#b8341f;border:1px solid #f3c4b8;}
  .banner.ok{background:#eef7ea;color:var(--green-d);border:1px solid #cdeabf;}

  .edge-stub{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:var(--muted);padding:40px;text-align:center;}
  .edge-stub .big{font-size:20px;font-weight:700;color:var(--ink);}
  .edge-stub .tag{background:#fff3ee;color:var(--orange);border:1px solid #f2c9b9;padding:5px 12px;border-radius:20px;font-weight:700;font-size:12px;}
  .edge-stub ul{text-align:left;line-height:1.9;font-size:13px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px 22px;}
  .edge-stub ul b{color:var(--ink);}
  svg text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/jsx-source">
const { useState, useMemo, useCallback, useRef, useEffect, Fragment } = React;

/* ================= SHAPE SPEC ================= */
const BOUNDARY_TYPES = ['Strongest Edge', 'First Edge', 'Last Edge'];
const POLARITIES = ['Both', 'Light to Dark', 'Dark to Light'];

const SHAPES = {
  circle: {
    label: 'Circle', prefix: 'Circle', drawKind: 'circle', coordTitle: 'Circle Coordinates',
    hasCaliperType: true, caliperTypes: ['Circle Caliper', 'Sector Caliper'], caliperViz: true,
    caliperParams: ['number', 'height'], caliperNote: 'Caliper width is auto-derived — calipers evenly distributed around the circle.',
    coordsByCaliper: {
      'Circle Caliper': [['cx', 'Centre X'], ['cy', 'Centre Y'], ['r', 'Radius']],
      'Sector Caliper': [['sx', 'Start X'], ['sy', 'Start Y'], ['ex', 'End X'], ['ey', 'End Y'], ['r', 'Radius']],
    },
    boundary: { types: BOUNDARY_TYPES, polarity: true, threshold: true, window: true },
    extras: [], general: [], perUnit: null,
    outputs: ['Centre', 'Radius', 'Perimeter', 'Area', 'Circularity', 'Convexity', 'Contour Continuity'],
  },
  line: {
    label: 'Line', prefix: 'Line', drawKind: 'line', coordTitle: 'Line Coordinates',
    hasCaliperType: false, caliperViz: true,
    caliperParams: ['number', 'width', 'height'], caliperNote: '',
    coords: [['sx', 'Start X'], ['sy', 'Start Y'], ['ex', 'End X'], ['ey', 'End Y'], ['angle', 'Angle°']],
    boundary: { types: [...BOUNDARY_TYPES, 'Close to Mid'], polarity: true, threshold: true, window: true },
    extras: [], general: [], perUnit: null,
    outputs: ['Start', 'End', 'Middle', 'Angle'],
  },
  ellipse: {
    label: 'Ellipse', prefix: 'Ellipse', drawKind: 'box', coordTitle: 'Box Coordinates',
    hasCaliperType: false, caliperViz: false,
    caliperParams: ['number'], caliperNote: 'Caliper width & height are auto-derived from the box dimensions.',
    coords: [['cx', 'Centre X'], ['cy', 'Centre Y'], ['w', 'Width'], ['h', 'Height'], ['angle', 'Angle°']],
    boundary: { types: BOUNDARY_TYPES, polarity: true, threshold: true, window: false },
    extras: [['smallAxis', 'Small Ellipse Axis', '0–1 · ratio of small ellipse axis to box length'],
             ['largeAxis', 'Large Ellipse Axis', '0–1 · ratio of large ellipse axis to box length']],
    general: [], perUnit: null,
    outputs: ['Centre', 'Focii', 'Major axis', 'Minor axis', 'Angle'],
  },
  quad: {
    label: 'Quadrilateral', prefix: 'Quadrilateral', drawKind: 'quad', coordTitle: 'Box Coordinates',
    hasCaliperType: false, caliperViz: false,
    caliperParams: ['number'], caliperNote: 'Caliper height & caliper width are derived from the box dimensions and number of calipers.',
    coords: [['cx', 'Centre X'], ['cy', 'Centre Y'], ['w', 'Width'], ['h', 'Height'], ['angle', 'Angle°']],
    boundary: { types: BOUNDARY_TYPES, polarity: true, threshold: true, window: true },
    extras: [], general: [],
    perUnit: { kind: 'box', count: 4, label: 'Box', perCoords: true, perCaliper: true },
    outputs: ['Start', 'End', 'Middle', 'Angle (per line)', 'Centre (per line)', 'Diagonals'],
  },
  parallel: {
    label: 'Parallel Line Search', prefix: 'ParallelLine', drawKind: 'box', coordTitle: 'Box Coordinates',
    hasCaliperType: false, caliperViz: false,
    caliperParams: ['number'], caliperNote: 'Caliper width & height are auto-derived from the box dimensions.',
    coords: [['cx', 'Centre X'], ['cy', 'Centre Y'], ['w', 'Width'], ['h', 'Height'], ['angle', 'Angle°']],
    boundary: { types: BOUNDARY_TYPES, polarity: true, threshold: true, window: false },
    extras: [], general: [['maxAngleDiff', 'Max Angle Difference', 'degrees · angle difference allowed between the two lines']],
    perUnit: { kind: 'edge', count: 2, label: 'Edge', perCoords: false, perCaliper: false },
    outputs: ['Start', 'End', 'Middle', 'Angle (per line)'],
  },
  edge: {
    label: 'Edge Search', prefix: 'EdgeSearch', drawKind: 'box', coordTitle: 'Box Coordinates',
    hasCaliperType: false, caliperViz: false,
    caliperParams: [], caliperNote: '',
    coords: [['cx', 'Centre X'], ['cy', 'Centre Y'], ['w', 'Width'], ['h', 'Height'], ['angle', 'Angle°']],
    boundary: { types: [...BOUNDARY_TYPES, 'All'], polarity: true, threshold: true, window: true },
    extras: [['maxResults', 'Maximum Result Number', 'max number of edges to return']],
    general: [], perUnit: null,
    outputs: ['Start', 'End', 'Middle', 'Angle (per line)'],
  },
  peak: {
    label: 'Peak Search', prefix: 'PeakSearch', drawKind: 'box', coordTitle: 'Box Coordinates',
    hasCaliperType: false, caliperViz: false,
    caliperParams: [], caliperNote: '',
    coords: [['cx', 'Centre X'], ['cy', 'Centre Y'], ['w', 'Width'], ['h', 'Height'], ['angle', 'Angle°']],
    boundary: { types: null, polarity: true, threshold: true, window: true },
    extras: [], general: [], perUnit: null, peak: true,
    outputs: ['Coordinate of the peak point'],
  },
};
const SHAPE_ORDER = ['circle', 'line', 'ellipse', 'quad', 'parallel', 'edge', 'peak'];

const CALIPER_PARAM_META = {
  number: { label: 'Caliper Number', def: 12, min: 1, max: 200 },
  height: { label: 'Caliper Height', def: 40, min: 1, max: 400, unit: 'px' },
  width:  { label: 'Caliper Width', def: 10, min: 1, max: 200, unit: 'px' },
};

const CLASS_MASKS = [
  { id: 'm1', label: 'Gasket → Instance 1' },
  { id: 'm2', label: 'Gasket → Instance 2' },
  { id: 'm3', label: 'Bore → Instance 1' },
];
const SEARCH_AREAS = [
  { id: 'sa1', label: 'SA_1 · Full Part' },
  { id: 'sa2', label: 'SA_2 · Flange Region' },

  const set = (patch) => onChange({ ...shape, ...patch });
  const hasWork = shape.drawn || shape.generated;
  const guard = (applyFn) => { if (hasWork) setConfirm(() => applyFn); else applyFn(); };

  if (!shape.type) {
    return (
      <div className={'shapecard' + (selected ? ' sel' : '')}>
        <div className="sc-hdr" onClick={onSelect}>
          <div className="t"><span className="chip num">{idx + 1}</span>Select a shape</div>
          <div className="tools"><span className="del" title="Delete shape" onClick={(e) => { e.stopPropagation(); onRemove(); }}><TrashIcon /></span></div>
        </div>
        {selected && (
          <div className="sc-body">
            <div className="field">
              <span className="lbl">Shape</span>
              <select className="sel" value="" onChange={(e) => { const t = e.target.value; onChange({ ...makeShape(t), id: shape.id, name: nameOptions(t)[0] || '' }); }}>
                <option value="">Select shape…</option>
                {SHAPE_ORDER.map((k) => <option key={k} value={k}>{SHAPES[k].label}</option>)}
              </select>
              <div className="hint">Pick a shape to configure its name, mode, calipers, coordinates and boundary parameters.</div>
              {showErr && <div className="err">⚠ Select a shape to configure.</div>}
            </div>
          </div>
        )}
      </div>
    );
  }

  const spec = SHAPES[shape.type];
  const coordDefs = spec.coordsByCaliper ? spec.coordsByCaliper[shape.caliperType] : spec.coords;
  const perUnit = spec.perUnit;
  const curUnit = perUnit ? shape.units[shape.selUnit] : null;
  const segNoMask = shape.mode === 'segmentation' && !shape.classMask;
  const overlapErr = shape.mode === 'segmentation' && shape.drawn && shape.offMask;
  const nameSuffix = shape.name && shape.name.startsWith(spec.prefix + '_') ? shape.name.slice(spec.prefix.length + 1) : (shape.name || '');
  const dupName = !!shape.name && (otherNames || []).includes(shape.name);
  const drawEnclosure = spec.drawKind === 'circle' ? 'Circle' : spec.drawKind === 'line' ? 'Line' : 'Box';

  const changeType = (t) => guard(() => onChange({ ...makeShape(t), id: shape.id, mode: shape.mode, classMask: shape.classMask, name: nameOptions(t)[0] || '' }));
  const changeMode = (m) => guard(() => set({ mode: m, drawn: false, generated: false, offMask: false, coords: {} }));
  const changeCaliperType = (ct) => guard(() => set({ caliperType: ct, drawn: false, generated: false, coords: {} }));

  const unitPatch = (field, patch) => {
    const units = shape.units.map((u, i) => i === shape.selUnit ? { ...u, [field]: { ...u[field], ...patch } } : u);
    set({ units });
  };
  const setCoord = (k, v) => {
    if (perUnit && perUnit.perCoords) {
      const units = shape.units.map((u, i) => i === shape.selUnit ? { ...u, coords: { ...u.coords, [k]: Number(v) } } : u);
      set({ units, generated: false });
    } else set({ coords: { ...shape.coords, [k]: Number(v) }, generated: false });
  };
  const shownCoords = perUnit && perUnit.perCoords ? curUnit.coords : shape.coords;

  return (
    <div className={'shapecard' + (selected ? ' sel' : '')}>
      <ConfirmModal open={!!confirm} onKeep={() => setConfirm(null)} onDiscard={() => { confirm(); setConfirm(null); }} />
      <div className="sc-hdr" onClick={onSelect}>
        <div className="t"><span className="chip num">{idx + 1}</span>{shape.name || spec.label}</div>
        <div className="tools"><span className="del" title="Delete shape" onClick={(e) => { e.stopPropagation(); onRemove(); }}><TrashIcon /></span></div>
      </div>
      {selected && (
        <div className="sc-body">
          {/* Shape type */}
          <div className="field">
            <span className="lbl">Shape</span>
            <select className="sel" value={shape.type} onChange={(e) => changeType(e.target.value)}>
              <option value="">Select shape…</option>
              {SHAPE_ORDER.map((k) => <option key={k} value={k}>{SHAPES[k].label}</option>)}
            </select>
          </div>

          {/* Shape name — editable text field, prefixed with the shape type */}
          <div className="field">
            <span className="lbl">Shape Name</span>
            <div className={'namewrap' + (dupName ? ' dup' : '')}>
              <span className="nameprefix">{spec.prefix}_</span>
              <input className="nameinput" type="text" value={nameSuffix} placeholder="1"
                onChange={(e) => set({ name: spec.prefix + '_' + e.target.value.replace(/\s+/g, '') })} />
            </div>
            {dupName
              ? <div className="err">⚠ A shape named “{shape.name}” already exists in this capture. Names must be unique.</div>
              : <div className="hint">Editable · prefixed with the shape type · unique within the capture.</div>}
          </div>

          {/* Mode */}
          <div className="field">
            <span className="lbl">Mode <span className="sub">· ROI the calipers search within</span></span>
            <div className="modetoggle">
              <button className={shape.mode === 'direct' ? 'on' : ''} onClick={() => changeMode('direct')}>Direct (Image / SA)</button>
              <button className={shape.mode === 'segmentation' ? 'on' : ''} onClick={() => changeMode('segmentation')}>Segmentation Class</button>
            </div>
          </div>

          {shape.mode === 'segmentation' && (
            <div className="field">
              <span className="lbl">Segmentation Class Mask</span>
              <select className="sel" value={shape.classMask} onChange={(e) => set({ classMask: e.target.value })}>
                <option value="">Select class mask…</option>
                {CLASS_MASKS.map((m) => <option key={m.id} value={m.id}>{m.label}</option>)}
              </select>
              {showErr && segNoMask && <div className="err">⚠ Select a class mask for segmentation mode.</div>}
            </div>
          )}

          {/* Caliper Type (circle) + Draw on the same row; else Draw full width */}
          <div className="field">
            {spec.hasCaliperType ? (
              <div className="rowcta">
                <div>
                  <span className="tinylab">Caliper Type</span>
                  <select className="sel" value={shape.caliperType} onChange={(e) => changeCaliperType(e.target.value)}>
                    {spec.caliperTypes.map((t) => <option key={t}>{t}</option>)}
                  </select>
                </div>
                <button className={'drawbtn ' + (arming ? 'armed' : shape.drawn ? 'done' : '')} onClick={onArmDraw}>
                  {arming ? '◉ Sketching…' : shape.drawn ? '↻ Redraw' : '✎ Draw ' + drawEnclosure}
                </button>
              </div>
            ) : (
              <button className={'drawbtn ' + (arming ? 'armed' : shape.drawn ? 'done' : '')} onClick={onArmDraw}>
                {arming ? '◉ Sketching on canvas…' : shape.drawn ? '↻ Redraw ' + drawEnclosure + ' on canvas' : '✎ Draw ' + drawEnclosure + (spec.drawKind === 'quad' ? ' (Quadra Box)' : '') + ' on canvas'}
              </button>
            )}
            {arming && <div className="hint">{spec.drawKind === 'circle' ? 'Drag from centre outward to set the radius.' : spec.drawKind === 'line' ? 'Drag from start to end point.' : 'Drag to draw the box enclosure.'}</div>}
            {shape.drawn && shape.mode === 'segmentation' && !shape.offMask && <div className="okline">✓ Calipers overlap the segmentation mask</div>}
            {overlapErr && <div className="err">⚠ Drawn ROI has no overlap with the segmentation mask. Reposition / redraw the shape.</div>}
            {showErr && !shape.drawn && <div className="err">⚠ Draw the {drawEnclosure.toLowerCase()} enclosure before proceeding.</div>}
          </div>

          {/* Coordinates */}
          {shape.drawn && (
            <div className="field">
              <div className="block-t">{spec.coordTitle}{perUnit && perUnit.perCoords ? ` · ${perUnit.label} ${shape.selUnit + 1}` : ''} <span className="ln" /></div>
              {perUnit && perUnit.perCoords && (
                <div className="boxtabs">
                  {shape.units.map((_, i) => <button key={i} className={shape.selUnit === i ? 'on' : ''} onClick={() => set({ selUnit: i })}>{perUnit.label} {i + 1}</button>)}
                </div>
              )}
              <div className="row3">
                {(perUnit && perUnit.perCoords ? spec.coords : coordDefs).map(([k, lab]) => (
                  <div key={k}>
                    <span className="tinylab">{lab}</span>
                    <input className="inp" type="number" value={shownCoords[k] ?? 0} onChange={(e) => setCoord(k, e.target.value)} />
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Caliper Parameters */}
          {shape.drawn && (spec.caliperParams.length > 0 ? (
            <div className="field">
              <div className="block-t">Caliper Parameters{perUnit && perUnit.perCaliper ? ` · ${perUnit.label} ${shape.selUnit + 1}` : ''} <span className="ln" /></div>
              <div className="row2">
                {spec.caliperParams.map((k) => {
                  const meta = CALIPER_PARAM_META[k];
                  const usePer = perUnit && perUnit.perCaliper;
                  const val = usePer ? curUnit.caliper[k] : shape.caliper[k];
                  const onV = (v) => usePer ? unitPatch('caliper', { [k]: v }) : set({ caliper: { ...shape.caliper, [k]: v } });
                  return <NumberField key={k} label={meta.label} unit={meta.unit} value={val} min={meta.min} max={meta.max} onChange={onV} />;
                })}
              </div>
              {spec.caliperNote && <div className="hint">{spec.caliperNote}</div>}
            </div>
          ) : (
            <div className="field"><span className="miniauto">No caliper-count parameter for {spec.label} — calipers are auto-generated.</span></div>
          ))}

          {/* Boundary Parameters */}
          {shape.drawn && (
            <div className="field">
              <div className="block-t">Boundary Parameters{perUnit ? ` · ${perUnit.label} ${shape.selUnit + 1}` : ''} <span className="ln" /></div>
              {perUnit && !perUnit.perCoords && (
                <div className="boxtabs">
                  {shape.units.map((_, i) => <button key={i} className={shape.selUnit === i ? 'on' : ''} onClick={() => set({ selUnit: i })}>{perUnit.label} {i + 1}</button>)}
                </div>
              )}
              <BoundaryEditor spec={spec}
                boundary={perUnit ? curUnit.boundary : shape.boundary}
                patch={(p) => perUnit ? unitPatch('boundary', p) : set({ boundary: { ...shape.boundary, ...p } })} />
            </div>
          )}

          {/* General params (e.g. Max Angle Difference) — outside per-unit editors */}
          {shape.drawn && spec.general.length > 0 && (
            <div className="field">
              <div className="block-t">General <span className="ln" /></div>
              {spec.general.map(([k, lab, sub]) => (
                <NumberField key={k} label={lab} sub={sub} value={shape.general[k]} min={0} max={180}
                  onChange={(v) => set({ general: { ...shape.general, [k]: v } })} />
              ))}
            </div>
          )}

          {/* Generate Shape */}
          {shape.drawn && (
            <button className={'genbtn' + (shape.generated ? ' re' : '') + (overlapErr ? ' dis' : '')}
              disabled={overlapErr}
              onClick={() => { if (!overlapErr) set({ generated: true }); }}>
              {shape.generated ? '↻ Regenerate shape trace' : '✦ Generate Shape'}
            </button>
          )}
          {shape.generated && <div className="okline" style={{ justifyContent: 'center', marginTop: 8 }}>✓ Shape trace generated on canvas</div>}
        </div>
      )}
    </div>
  );
}

/* ================= VISION ================= */
const STEPS = ['Module Inputs', 'Module Setup', 'Module Outputs'];

function VisionConfig({ toast }) {
  const [step, setStep] = useState(0);
  const [baseSA, setBaseSA] = useState('sa1');
  const [shapes, setShapes] = useState(() => [makeShape('')]);
  const [sel, setSel] = useState(() => shapes[0].id);
  const [showErr, setShowErr] = useState(false);
  const [arming, setArming] = useState(null);

  const activeShape = shapes.find((s) => s.id === sel) || shapes[0];
  const segMode = activeShape && activeShape.mode === 'segmentation';

  // name options for a given type: prefix + n, excluding names used by OTHER shapes
  const nameOptions = useCallback((type) => {
    const prefix = SHAPES[type]?.prefix || 'Shape';
    const used = new Set(shapes.filter((s) => s.id !== sel && s.type === type).map((s) => s.name));
    const out = [];
    for (let i = 1; out.length < 8; i++) { const nm = `${prefix}_${i}`; if (!used.has(nm)) out.push(nm); }
    return out;
  }, [shapes, sel]);

  const updateShape = (ns) => setShapes((prev) => prev.map((s) => s.id === ns.id ? ns : s));
  const addShape = () => { const ns = makeShape(''); setShapes((p) => [...p, ns]); setSel(ns.id); setShowErr(false); setArming(null); };
  const removeShape = (id) => setShapes((p) => {
    const nx = p.filter((s) => s.id !== id);
    if (id === sel && nx.length) setSel(nx[0].id);
    return nx.length ? nx : [makeShape('')];
  });

  const armDraw = () => {
    const spec = SHAPES[activeShape.type];
    if (spec.drawKind === 'quad') {
      // composite: place the 4-box template directly
      const cx = 250, cy = 190, w = 190, h = 120;
      const units = activeShape.units.map((u, i) => ({ ...u, coords: quadDefaultUnitsCoords(cx, cy, w, h)[i] }));
      const ns = { ...activeShape, drawn: true, generated: false, offMask: false, coords: { cx, cy, w, h, angle: 0 }, units };
      updateShape({ ...ns, offMask: SHAPES[ns.type] && ns.mode === 'segmentation' ? !computeOverlap(ns) : false });
      return;
    }
    setArming(activeShape.id);
  };
  const onDrawn = (geo) => {
    const coords = geoToCoords(activeShape, geo);
    let ns = { ...activeShape, drawn: true, generated: false, coords };
    if (SHAPES[ns.type].perUnit && SHAPES[ns.type].perUnit.perCoords) {
      ns.units = ns.units.map((u, i) => ({ ...u, coords: quadDefaultUnitsCoords(coords.cx, coords.cy, coords.w, coords.h)[i] }));
    }
    ns.offMask = ns.mode === 'segmentation' ? !computeOverlap(ns) : false;
    updateShape(ns); setArming(null);
  };
  const onRotate = (angle) => {
    const ns = { ...activeShape, coords: { ...activeShape.coords, angle }, generated: false };
    ns.offMask = ns.mode === 'segmentation' ? !computeOverlap(ns) : false;
    updateShape(ns);
  };

  const typedShapes = shapes.filter((s) => s.type);
  const namesList = typedShapes.map((s) => s.name);
  const namesUnique = new Set(namesList).size === namesList.length && namesList.every(Boolean);
  const setupValid = typedShapes.length > 0 && namesUnique && shapes.every((s) => {
    if (!s.type || !s.drawn || !s.generated) return false;
    if (s.mode === 'segmentation' && (!s.classMask || s.offMask)) return false;
    return true;
  });

  const onNext = () => {
    if (step === 0) { if (!baseSA) { setShowErr(true); return; } setShowErr(false); setStep(1); return; }
    if (step === 1) {
      if (!setupValid) { setShowErr(true); toast('Finish every shape: draw it, resolve errors, and Generate Shape.', true); return; }
      setShowErr(false); setStep(2); return;
    }
    toast('Shape Extractor configured');
  };
  const onBack = () => { if (step === 0) { toast('Exited module configuration'); return; } setArming(null); setStep(step - 1); };

  return (
    <Fragment>
      <div className="stage">
        <div className="canvas-col">
          <div className="canvas-tools">
            <div className="ct">◳ Fit</div><div className="ct">⤢ Zoom</div>
            <div className="ct" style={{ color: 'var(--orange)' }}>▧ {STEPS[step]}</div>
          </div>
          <Canvas activeShape={step >= 1 ? activeShape : null} segMode={step >= 1 && segMode}
            arming={step === 1 && arming === (activeShape && activeShape.id)} onDrawn={onDrawn} onRotate={onRotate} />
          {step === 1 && arming && <div className="drawhint arm">◉ {SHAPES[activeShape.type].drawKind === 'circle' ? 'Drag from centre to set radius' : SHAPES[activeShape.type].drawKind === 'line' ? 'Drag from start to end' : 'Drag to draw the box'}</div>}
          {step === 1 && !arming && activeShape && !activeShape.type && <div className="drawhint">◆ Select a shape in the panel to begin</div>}
          {step === 1 && !arming && activeShape && activeShape.type && !activeShape.drawn && <div className="drawhint">✎ Click <span className="k">Draw</span> in the panel, then sketch here</div>}
        </div>

        <div className="flow-col">
          <div className="fnode master"><div className="ft">Master Image</div><div className="fs">1 capture</div></div>
          <div className="fconn" />
          <div className="fnode done"><span className="badge">✓</span><div className="ft">Segmentation</div><div className="fs">SEG_1</div></div>
          <div className="fconn" />
          <div className="fnode done"><span className="badge">✓</span><div className="ft">Search Area</div><div className="fs">SA_1</div></div>
          <div className="fconn" />
          <div className="fnode sel"><div className="ft">Shape Extractor</div><div className="fs">SHE_1</div></div>
        </div>

        <div className="pane">
          <div className="pane-hdr"><div className="ic"><span className="sq" /><span>4. Shape Extractor</span></div><span className="x" title="Close">✕</span></div>
          <div className="stepper">
            {STEPS.map((s, i) => (<Fragment key={s}><span className={'st' + (i === step ? ' active' : '')}>{s}</span>{i < STEPS.length - 1 && <span className="sep">›</span>}</Fragment>))}
          </div>

          <div className="pane-body">
            {step === 0 && (
              <div className="sec">
                <span className="lbl">Base Search Area</span>
                <select className="sel" value={baseSA} onChange={(e) => setBaseSA(e.target.value)}>
                  {SEARCH_AREAS.map((s) => <option key={s.id} value={s.id}>{s.label}</option>)}
                </select>
                <div className="hint">The parent search area (or masking / orientator output) this module runs on. Selecting a segmentation class is optional and is chosen per-shape in Module Setup.</div>
              </div>
            )}

            {step === 1 && (
              <div>
                <div style={{ padding: '12px 14px 2px' }}><button className="addbtn" onClick={addShape}>＋ Add Shape</button></div>
                {shapes.map((s, i) => (
                  <ShapeCard key={s.id} shape={s} idx={i} selected={s.id === sel}
                    onSelect={() => { setSel(s.id); setArming(null); }} onChange={updateShape} onRemove={() => removeShape(s.id)}
                    showErr={showErr && s.id === sel} nameOptions={nameOptions}
                    otherNames={shapes.filter((o) => o.id !== s.id).map((o) => o.name).filter(Boolean)}
                    onArmDraw={armDraw} arming={arming === s.id} />
                ))}
              </div>
            )}

            {step === 2 && (
              <div>
                <div style={{ padding: '12px 14px 4px', fontSize: 12, color: 'var(--muted)' }}>
                  Every extracted shape and its measurements are passed downstream (selected by default, non-editable).
                </div>
                {typedShapes.map((s, i) => {
                  const spec = SHAPES[s.type];
                  const errPct = (0.4 + wob(i + 2, 0.9) + 0.9).toFixed(1);
                  return (
                    <div className="outcard" key={s.id}>
                      <div className="oh"><span className="chip num" style={{ width: 19, height: 19, borderRadius: '50%', background: 'var(--ink)', color: '#fff', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 11 }}>{i + 1}</span>{s.name || spec.label}</div>
                      <div className="ob">
                        {spec.outputs.map((o) => (
                          <label className="outrow" key={o}><input type="checkbox" checked disabled readOnly /><span className="on">{o}</span></label>
                        ))}
                        <label className="outrow errrow"><input type="checkbox" checked disabled readOnly /><span className="on">Error %</span><span className="emv">≈ {errPct}%</span></label>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          <div className="pane-foot">
            <button className="btn btn-ghost" onClick={onBack}>{step === 0 ? 'Exit' : 'Back'}</button>
            <button className="btn btn-primary" onClick={onNext} disabled={step === 0 && !baseSA}>{step === STEPS.length - 1 ? 'Finish' : 'Next'}</button>
          </div>
        </div>
      </div>

      <div className="appbar">
        <span className="pill">1 of 4 · Inspection Workflow</span>
        <div className="steps">{STEPS.map((s, i) => <span key={s} className={'s' + (i === step ? ' cur' : '')}>{s}</span>)}</div>
        <span style={{ marginLeft: 'auto', color: 'var(--muted)' }}>{shapes.filter((s) => s.generated).length} shape{shapes.filter((s) => s.generated).length === 1 ? '' : 's'} configured</span>
      </div>
    </Fragment>
  );
}

/* ================= EDGE · EDIT MODULE CONFIGURATIONS ================= */
const clone = (x) => JSON.parse(JSON.stringify(x));
const DIM_TYPE_OPTS = [
  { v: 1, n: 'Angle' }, { v: 2, n: 'Distance' }, { v: 3, n: 'Area' },
  { v: 4, n: 'Length' }, { v: 5, n: 'Convexity' }, { v: 6, n: 'ContourContinuity' },
];
const DIST_AXIS_OPTS = ['x', 'y', 'euclidean'];
const EUC_MODE_OPTS = ['centre-to-centre', 'edge-to-edge', 'nearest'];
const UNIT_OPTS = ['mm', 'mm²', '°', 'px'];
// geometric features a shape exposes as a dimensioning endpoint
const SHAPE_FEATURES = {
  circle: ['Centre', 'Edge point', 'Radius'],
  line: ['Start', 'End', 'Middle', 'Whole line'],
  ellipse: ['Centre', 'Major axis', 'Minor axis', 'Focus 1', 'Focus 2'],
  quad: ['Corner', 'Edge', 'Centre', 'Diagonal'],
  parallel: ['Line 1', 'Line 2', 'Mid line'],
  edge: ['Detected line'],
  peak: ['Peak point'],
};
const unitForType = (t) => (t === 1 ? '°' : t === 3 ? 'mm²' : 'mm');
function makeDim(shapes, n) {
  const s0 = shapes[0], s1 = shapes[1] || shapes[0];
  const feat = (s) => (s ? (SHAPE_FEATURES[s.type] || [''])[0] : '');
  return {
    id: 'dim_' + Math.floor(rnd() * 1e6), name: 'Dimension_' + n,
    type: 2, distanceAxis: 'euclidean', euclideanMode: 'centre-to-centre', piecewise: false,
    shapeOneId: s0 ? s0.id : '', shapeOneSelector: feat(s0),
    shapeTwoId: s1 ? s1.id : '', shapeTwoSelector: feat(s1),
    operator: 1, targetValue: 0, tolerance: 0, unit: 'mm', ratio: 0.05,
  };
}

function seedEdgeShapes() {
  const mk = (type, name, coords, extra) => {
    const s = makeShape(type, name); s.drawn = true; s.generated = true; s.coords = coords;
    if (extra) Object.assign(s, extra); return s;
  };
  return [
    mk('circle', 'Circle_1', { cx: 250, cy: 190, r: 90 }),
    mk('line', 'Line_1', { sx: 150, sy: 120, ex: 360, ey: 250, angle: 32 }),
    mk('ellipse', 'Ellipse_1', { cx: 250, cy: 190, w: 190, h: 120, angle: 0 }, { mode: 'segmentation', classMask: 'm1' }),
  ];
}
// No dimensions are inherited from Vision — the operator authors them here.
function seedDims() { return []; }

// One read-only-identity, editable-params shape card (Edge side)
function EdgeShapeCard({ shape, idx, selected, onSelect, onChange }) {
  const spec = SHAPES[shape.type];
  const set = (patch) => onChange({ ...shape, ...patch });
  const perUnit = spec.perUnit;
  const curUnit = perUnit ? shape.units[shape.selUnit] : null;
  const coordDefs = spec.coordsByCaliper ? spec.coordsByCaliper[shape.caliperType] : spec.coords;
  const shownCoords = perUnit && perUnit.perCoords ? curUnit.coords : shape.coords;
  const setCoord = (k, v) => {
    if (perUnit && perUnit.perCoords) {
      const units = shape.units.map((u, i) => i === shape.selUnit ? { ...u, coords: { ...u.coords, [k]: Number(v) } } : u);
      set({ units });
    } else set({ coords: { ...shape.coords, [k]: Number(v) } });
  };
  const unitPatch = (field, patch) => {
    const units = shape.units.map((u, i) => i === shape.selUnit ? { ...u, [field]: { ...u[field], ...patch } } : u);
    set({ units });
  };
  return (
    <div className={'shapecard' + (selected ? ' sel' : '')}>
      <div className="sc-hdr" onClick={onSelect}>
        <div className="t"><span className="chip num">{idx + 1}</span>{shape.name}</div>
      </div>
      {selected && (
        <div className="sc-body">
          {/* Read-only identity */}
          <div className="row2 field">
            <div><span className="tinylab">Shape</span><input className="roinput" value={spec.label} readOnly /></div>
            <div><span className="tinylab">Shape Name</span><input className="roinput" value={shape.name} readOnly /></div>
          </div>
          <div className="row2 field">
            <div><span className="tinylab">Mode</span><input className="roinput" value={shape.mode === 'segmentation' ? 'Segmentation Class' : 'Direct (Image / SA)'} readOnly /></div>
            {spec.hasCaliperType && <div><span className="tinylab">Caliper Type</span><input className="roinput" value={shape.caliperType} readOnly /></div>}
          </div>
          {shape.mode === 'segmentation' && (
            <div className="field"><span className="tinylab">Segmentation Class Mask</span>
              <input className="roinput" value={(CLASS_MASKS.find((m) => m.id === shape.classMask) || {}).label || ''} readOnly /></div>
          )}

          {/* Editable coordinates */}
          <div className="field">
            <div className="block-t">{spec.coordTitle}{perUnit && perUnit.perCoords ? ` · ${perUnit.label} ${shape.selUnit + 1}` : ''} <span className="ln" /></div>
            {perUnit && perUnit.perCoords && (
              <div className="boxtabs">{shape.units.map((_, i) => <button key={i} className={shape.selUnit === i ? 'on' : ''} onClick={() => set({ selUnit: i })}>{perUnit.label} {i + 1}</button>)}</div>
            )}
            <div className="row3">
              {(perUnit && perUnit.perCoords ? spec.coords : coordDefs).map(([k, lab]) => (
                <div key={k}><span className="tinylab">{lab}</span>
                  <input className="inp" type="number" value={shownCoords[k] ?? 0} onChange={(e) => setCoord(k, e.target.value)} /></div>
              ))}
            </div>
          </div>

          {/* Editable caliper params */}
          {spec.caliperParams.length > 0 ? (
            <div className="field">
              <div className="block-t">Caliper Parameters{perUnit && perUnit.perCaliper ? ` · ${perUnit.label} ${shape.selUnit + 1}` : ''} <span className="ln" /></div>
              <div className="row2">
                {spec.caliperParams.map((k) => {
                  const meta = CALIPER_PARAM_META[k];
                  const usePer = perUnit && perUnit.perCaliper;
                  const val = usePer ? curUnit.caliper[k] : shape.caliper[k];
                  const onV = (v) => usePer ? unitPatch('caliper', { [k]: v }) : set({ caliper: { ...shape.caliper, [k]: v } });
                  return <NumberField key={k} label={meta.label} unit={meta.unit} value={val} min={meta.min} max={meta.max} onChange={onV} />;
                })}
              </div>
              {spec.caliperNote && <div className="hint">{spec.caliperNote}</div>}
            </div>
          ) : (
            <div className="field"><span className="miniauto">No caliper-count parameter for {spec.label} — calipers auto-generated.</span></div>
          )}

          {/* Editable boundary params */}
          <div className="field">
            <div className="block-t">Boundary Parameters{perUnit ? ` · ${perUnit.label} ${shape.selUnit + 1}` : ''} <span className="ln" /></div>
            {perUnit && !perUnit.perCoords && (
              <div className="boxtabs">{shape.units.map((_, i) => <button key={i} className={shape.selUnit === i ? 'on' : ''} onClick={() => set({ selUnit: i })}>{perUnit.label} {i + 1}</button>)}</div>
            )}
            <BoundaryEditor spec={spec} boundary={perUnit ? curUnit.boundary : shape.boundary}
              patch={(p) => perUnit ? unitPatch('boundary', p) : set({ boundary: { ...shape.boundary, ...p } })} />
          </div>

          {spec.general.length > 0 && (
            <div className="field">
              <div className="block-t">General <span className="ln" /></div>
              {spec.general.map(([k, lab, sub]) => (
                <NumberField key={k} label={lab} sub={sub} value={shape.general[k]} min={0} max={180}
                  onChange={(v) => set({ general: { ...shape.general, [k]: v } })} />
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function EdgeShapeEditor({ shapes, setShapes, sel, setSel, onDirty }) {
  const active = shapes.find((s) => s.id === sel) || shapes[0];
  const update = (ns) => { setShapes((p) => p.map((s) => s.id === ns.id ? ns : s)); onDirty(); };
  const onRotate = (angle) => update({ ...active, coords: { ...active.coords, angle } });
  return (
    <div className="emc-split">
      <div className="emc-config">
        <div style={{ padding: '12px 14px', fontSize: 12, color: 'var(--muted)' }}>
          Shape, name, mode and caliper type were set in Vision and are shown for reference. Tune coordinates, caliper &amp; boundary parameters here.
        </div>
        {shapes.map((s, i) => (
          <EdgeShapeCard key={s.id} shape={s} idx={i} selected={s.id === sel} onSelect={() => setSel(s.id)} onChange={update} />
        ))}
      </div>
      <div className="emc-canvas">
        <div className="canvas-tools">
          <div className="ct">◳ Fit</div><div className="ct">⤢ Zoom</div>
          <div className="ct" style={{ color: 'var(--orange)' }}>▧ {active ? active.name : ''}</div>
        </div>
        <Canvas activeShape={active} segMode={active && active.mode === 'segmentation'} arming={false} onDrawn={() => {}} onRotate={onRotate} />
      </div>
    </div>
  );
}

function EdgeDimensioning({ dims, setDims, shapes, onDirty, onAdd, onRemove }) {
  const patch = (i, p) => { setDims((prev) => prev.map((d, idx) => idx === i ? { ...d, ...p } : d)); onDirty(); };
  const shapeName = (id) => (shapes.find((s) => s.id === id) || {}).name || '';
  const featOpts = (id) => { const s = shapes.find((x) => x.id === id); return s ? SHAPE_FEATURES[s.type] : []; };
  return (
    <div className="emc-dim">
      {dims.length === 0
        ? <div className="banner warn">⚠ No dimensioning configured for this capture. A Shape Extractor capture with no dimensioning <b>cannot be deployed</b> — add at least one dimension before deploying.</div>
        : <div className="banner ok">✓ {dims.length} dimension{dims.length > 1 ? 's' : ''} created. Dimensions are computed between this capture's Shape Extractor shapes.</div>}

      <button className="addbtn" style={{ marginBottom: 16 }} onClick={onAdd}>＋ Add Dimension</button>

      {dims.map((dim, index) => {
        const single = [3, 5, 6].includes(dim.type);   // Area / Convexity / ContourContinuity → one feature
        const noGT = [5, 6].includes(dim.type);
        return (
          <div className="dimcard" key={dim.id}>
            <div className="dh">
              <span className="chip num">{index + 1}</span>
              <span style={{ flex: 1 }}>{dim.name || `Dimension ${index + 1}`}</span>
              <span className="del" title="Delete dimension" style={{ cursor: 'pointer' }} onClick={() => onRemove(dim.id)}><TrashIcon /></span>
            </div>

            {/* Name */}
            <div className="field">
              <span className="tinylab">Dimension Name</span>
              <input className="inp" type="text" value={dim.name} onChange={(e) => patch(index, { name: e.target.value })} />
            </div>

            {/* Type + type-dependent dropdowns */}
            <div className="row3" style={{ marginBottom: 12 }}>
              <div><span className="tinylab">Type</span>
                <select className="sel" value={dim.type} onChange={(e) => { const t = Number(e.target.value); patch(index, { type: t, unit: unitForType(t) }); }}>
                  {DIM_TYPE_OPTS.map((o) => <option key={o.v} value={o.v}>{o.n}</option>)}
                </select>
              </div>
              {dim.type === 2 && (
                <div><span className="tinylab">Distance Axis</span>
                  <select className="sel" value={dim.distanceAxis} onChange={(e) => patch(index, { distanceAxis: e.target.value })}>
                    {DIST_AXIS_OPTS.map((o) => <option key={o}>{o}</option>)}
                  </select>
                </div>
              )}
              {dim.type === 2 && dim.distanceAxis === 'euclidean' && (
                <div><span className="tinylab">Euclidean Mode</span>
                  <select className="sel" value={dim.euclideanMode} onChange={(e) => patch(index, { euclideanMode: e.target.value })}>
                    {EUC_MODE_OPTS.map((o) => <option key={o}>{o}</option>)}
                  </select>
                </div>
              )}
              {dim.type === 4 && (
                <div><span className="tinylab">Piecewise</span>
                  <select className="sel" value={dim.piecewise ? 'Yes' : 'No'} onChange={(e) => patch(index, { piecewise: e.target.value === 'Yes' })}>
                    <option>No</option><option>Yes</option>
                  </select>
                </div>
              )}
            </div>

            {/* Feature A */}
            <div className="field">
              <span className="tinylab">Feature A</span>
              <div className="feat">
                <select className="sel" value={dim.shapeOneId} onChange={(e) => patch(index, { shapeOneId: e.target.value, shapeOneSelector: (featOpts(e.target.value)[0] || '') })}>
                  {shapes.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
                {!single && (
                  <select className="sel" value={dim.shapeOneSelector} onChange={(e) => patch(index, { shapeOneSelector: e.target.value })}>
                    {featOpts(dim.shapeOneId).map((f) => <option key={f}>{f}</option>)}
                  </select>
                )}
              </div>
            </div>

            {/* Feature B (two-feature types only) */}
            {!single && (
              <div className="field">
                <span className="tinylab">Feature B</span>
                <div className="feat">
                  <select className="sel" value={dim.shapeTwoId} onChange={(e) => patch(index, { shapeTwoId: e.target.value, shapeTwoSelector: (featOpts(e.target.value)[0] || '') })}>
                    {shapes.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
                  </select>
                  <select className="sel" value={dim.shapeTwoSelector} onChange={(e) => patch(index, { shapeTwoSelector: e.target.value })}>
                    {featOpts(dim.shapeTwoId).map((f) => <option key={f}>{f}</option>)}
                  </select>
                </div>
              </div>
            )}

            {/* Ground Truth (editable) */}
            {!noGT && (
              <>
                <div className="block-t" style={{ marginTop: 8 }}>Ground Truth <span className="ln" /></div>
                <div className="gtgrid">
                  <div><span className="tinylab">Operator</span>
                    <select className="sel" value={dim.operator} onChange={(e) => patch(index, { operator: Number(e.target.value) })}>
                      <option value={1}>=</option><option value={2}>&gt;</option><option value={3}>&lt;</option>
                    </select>
                  </div>
                  <div><span className="tinylab">Value</span>
                    <input className="inp" type="number" min="0" value={dim.targetValue} onChange={(e) => patch(index, { targetValue: Math.max(0, Number(e.target.value)) })} /></div>
                  <div><span className="tinylab">Tolerance</span>
                    <input className="inp" type="number" min="0" value={dim.tolerance} onChange={(e) => patch(index, { tolerance: Math.max(0, Number(e.target.value)) })} /></div>
                  <div><span className="tinylab">Unit</span>
                    <select className="sel" value={dim.unit} onChange={(e) => patch(index, { unit: e.target.value })}>
                      {UNIT_OPTS.map((u) => <option key={u}>{u}</option>)}
                    </select>
                  </div>
                </div>
                <div className="field" style={{ marginTop: 10 }}>
                  <span className="tinylab">Ratio (pixel to mm)</span>
                  <input className="inp" type="number" min="0" step="0.001" value={dim.ratio} onChange={(e) => patch(index, { ratio: Math.max(0, Number(e.target.value)) })} />
                </div>
              </>
            )}
          </div>
        );
      })}
    </div>
  );
}

function EdgeEMC({ toast }) {
  const [shapes, setShapes] = useState(seedEdgeShapes);
  const [dims, setDims] = useState(seedDims);
  const [sel, setSel] = useState(() => shapes[0].id);
  const [moduleSel, setModuleSel] = useState('she1');
  const [dirty, setDirty] = useState(false);
  const [reviewModal, setReviewModal] = useState(false);
  const initial = useRef(null);
  useEffect(() => { initial.current = { shapes: clone(shapes), dims: clone(dims) }; }, []);
  const markDirty = () => setDirty(true);

  const onSave = () => {
    const wasShapeEdit = moduleSel === 'she1' && dirty;
    initial.current = { shapes: clone(shapes), dims: clone(dims) };
    setDirty(false);
    if (moduleSel === 'she1') {
      toast('Shape Extractor changes saved');
      if (wasShapeEdit) setReviewModal(true);   // PRD: warn dimensioning may have changed
    } else {
      toast('Dimensioning changes saved');
    }
  };
  const onReset = () => {
    if (!initial.current) return;
    setShapes(clone(initial.current.shapes));
    setDims(clone(initial.current.dims));
    setDirty(false);
  };
  const addDim = () => { setDims((p) => [...p, makeDim(shapes, p.length + 1)]); setDirty(true); };
  const removeDim = (id) => { setDims((p) => p.filter((d) => d.id !== id)); setDirty(true); };

  return (
    <div className="emc">
      <div className="emc-crumbs">Instances <span>›</span> Inferencing Customization <span>›</span> <b>Edit Module Configurations</b></div>
      <div className="emc-selectors">
        <div className="fld grow">
          <label>Instance <span style={{ fontWeight: 400, color: 'var(--muted)' }}>(Instance · Project · Plant)</span></label>
          <select className="sel"><option>Line-A Cell 3 · GasketInspect · Plant Pune</option></select>
        </div>
        <div className="fld">
          <label>Variant | Capture</label>
          <select className="sel"><option>Variant A | Cam 1</option></select>
        </div>
        <div className="fld">
          <label>Module</label>
          <select className="sel" value={moduleSel} onChange={(e) => setModuleSel(e.target.value)}>
            <option value="she1">SHE_1 · Shape Extractor</option>
            <option value="dim">Dimensioning from Shape Extractor</option>
          </select>
        </div>
      </div>

      <div className="emc-body">
        {moduleSel === 'she1'
          ? <EdgeShapeEditor shapes={shapes} setShapes={setShapes} sel={sel} setSel={setSel} onDirty={markDirty} />
          : <EdgeDimensioning dims={dims} setDims={setDims} shapes={shapes} onDirty={markDirty} onAdd={addDim} onRemove={removeDim} />}
      </div>

      <div className="emc-foot">
        <button className="btn btn-ghost sm" disabled={!dirty} onClick={onReset}>Reset</button>
        <button className="btn btn-primary sm" disabled={!dirty} onClick={onSave}>Save</button>
      </div>

      {reviewModal && (
        <div className="overlay" onClick={() => setReviewModal(false)}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>
            <div className="mh">⚠ Review dimensioning before deploying</div>
            <div className="mb">You changed a Shape Extractor module. The dimensioning computed from its shapes may have changed as a result. Please review the <b>“Dimensioning from Shape Extractor”</b> section before making any deployments.</div>
            <div className="mf">
              <button className="btn btn-ghost" onClick={() => setReviewModal(false)}>Dismiss</button>
              <button className="btn btn-primary" onClick={() => { setModuleSel('dim'); setReviewModal(false); }}>Review Dimensioning</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ================= APP ================= */
function App() {
  const [view, setView] = useState('vision');
  const [toast, setToast] = useState(null);
  const showToast = (msg, warn) => { setToast({ msg, warn }); setTimeout(() => setToast(null), 2400); };
  return (
    <div className="app">
      <div className="topbar">
        <div className="brand">
          <span className="dot">F</span><span>Shape Extractor</span>
          <span className="crumbs">&nbsp;·&nbsp; Recipe Management ▸ Variant A ▸ Cam 1 ▸ <b>Module Configuration</b></span>
        </div>
        <div className="switch">
          <button className={view === 'vision' ? 'on' : ''} onClick={() => setView('vision')}><span className="pv">VISION</span> Module Configuration</button>
          <button className={view === 'edge' ? 'on' : ''} onClick={() => setView('edge')}><span className="pv edge">EDGE</span> Edit Module Configurations</button>
        </div>
      </div>
      {view === 'vision' ? <VisionConfig toast={showToast} /> : <EdgeEMC toast={showToast} />}
      {toast && <div className={'toast' + (toast.warn ? ' warn' : '')}>{toast.warn ? '⚠' : '✓'} {toast.msg}</div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

  new Function(out)();
